<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messenger Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="toggle-row">
    <img src="icons/FB.png" alt="Facebook" class="toggle-icon" />
    <span class="toggle-label">Redirect to Messenger</span>
    <label class="switch">
      <input type="checkbox" id="toggle-focus">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <img src="icons/FB.png" alt="Messenger" class="toggle-icon" />
    <span class="toggle-label">Remove Top Bar</span>
    <label class="switch">
      <input type="checkbox" id="toggle-banner">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <img src="icons/IG.png" alt="Instagram" class="toggle-icon" />
    <span class="toggle-label">Redirect to Direct</span>
    <label class="switch">
      <input type="checkbox" id="toggle-instagram-focus">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <img src="icons/IG.png" alt="Sidebar" class="toggle-icon" />
    <span class="toggle-label">Remove Sidebar</span>
    <label class="switch">
      <input type="checkbox" id="toggle-instagram-sidebar">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
