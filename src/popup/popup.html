<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messenger Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="toggle-row">
    <span class="toggle-label">Redirect to Messenger</span>
    <label class="switch">
      <input type="checkbox" id="toggle-focus">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Remove Top Bar</span>
    <label class="switch">
      <input type="checkbox" id="toggle-banner">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="focus-status"></div>
  <script src="popup.js"></script>
</body>
</html>
